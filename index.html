<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Música</title>
<style>
body {display:flex; justify-content:center; align-items:center; height:100vh; background:#0e1a14; color:white; font-family:sans-serif;}
#envelope {width:300px; height:200px; background:green; display:flex; justify-content:center; align-items:center; cursor:pointer;}
</style>
</head>
<body>

<audio id="music" loop preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_1f4441b0e7.mp3" type="audio/mp3">
</audio>

<div id="envelope">Clique para abrir</div>

<script>
const envelope = document.getElementById('envelope');
const music = document.getElementById('music');

envelope.addEventListener('click', () => {
    // TOCA A MÚSICA IMEDIATAMENTE — primeiro comando
    music.volume = 0.4;
    music.play().then(() => console.log("Música a tocar!"))
               .catch(err => console.log("Erro:", err));

    // Depois podemos abrir envelope
    envelope.style.background = "white";
    envelope.style.color = "black";
    envelope.textContent = "Envelope Aberto!";
});
</script>

</body>
</html>
