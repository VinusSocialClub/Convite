<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniela & Alexandre</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #dfe5de;
  overflow: hidden;
}

h1, h2 {
  font-family: 'Playfair Display', serif;
}

/* CAPA / ENVELOPE */
.scene {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: 20;
  overflow: hidden;
  background: #dfe5de;
}

.envelope {
  position: relative;
  width: 100%;
  height: 100%;
  cursor: pointer;
  transition: opacity 0.9s ease, transform 0.9s ease;
}

.envelope.open {
  opacity: 0;
  transform: scale(1.015);
}

.envelope-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  background: url('./envelope-capa.jpg') center center / cover no-repeat;
}

/* botão invisível em cima do selo */
.seal-hitbox {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 140px;
  height: 140px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  z-index: 3;
  background: transparent;
}

/* MAIN */
.main {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  background: #f7f7f7;
  overflow-y: auto;
  opacity: 0;
  visibility: hidden;
  transition: all 1s ease;
}

.main.show {
  opacity: 1;
  visibility: visible;
}

section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 40px;
  text-align: center;
}

.hero {
  background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486?q=80&w=1974');
  background-size: cover;
  background-position: center;
  color: white;
}

.gallery img {
  width: 250px;
  margin: 10px;
  border-radius: 10px;
}

.countdown {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: #2e5d46;
  color: white;
  text-align: center;
  margin-top: 20px;
}

.countdown .logo h1 {
  font-size: 60px;
  margin-bottom: 15px;
}

.countdown h2 {
  font-size: 20px;
  margin-bottom: 30px;
}

#timer {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

#timer div {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 10px;
  min-width: 80px;
}

#timer div span {
  font-size: 32px;
  font-weight: 700;
}

#timer div p {
  margin-top: 5px;
  font-size: 14px;
}

.rsvp {
  background: #1f3a2e;
  color: white;
}

button {
  margin-top: 20px;
  padding: 12px 24px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #1f3a2e;
  cursor: pointer;
}

.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #1f3a2e;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 20px;
  cursor: pointer;
  z-index: 100;
  display: none;
}

@media (max-width: 768px) {
  .seal-hitbox {
    width: 120px;
    height: 120px;
  }
}
</style>
</head>
<body>

<audio id="music" loop preload="auto">
  <source src="daylight.mp3" type="audio/mp3">
</audio>

<button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>

<div class="scene" id="scene">
  <div class="envelope" id="envelope">
    <div class="envelope-image"></div>
    <div class="seal-hitbox" id="sealButton" aria-label="Abrir convite"></div>
  </div>
</div>

<div class="main" id="main">
  <section class="hero">
    <h1>Daniela & Alexandre</h1>
    <p>14 Outubro 2028 · Lisboa</p>
  </section>

  <section class="gallery">
    <h2>Momentos</h2>
    <div>
      <img src="https://images.unsplash.com/photo-1519741497674-611481863552" alt="Foto 1" />

      <section class="countdown">
        <div class="logo"><h1>D&amp;A</h1></div>
        <h2>Countdown to the most special day of our lives</h2>
        <div id="timer">
          <div><span id="days">0</span><p>Days</p></div>
          <div><span id="hours">0</span><p>Hours</p></div>
          <div><span id="minutes">0</span><p>Minutes</p></div>
          <div><span id="seconds">0</span><p>Seconds</p></div>
        </div>
      </section>

      <img src="https://images.unsplash.com/photo-1520857014576-2c4f4c972b57" alt="Foto 2" />
    </div>
  </section>

  <section class="rsvp">
    <h2>Confirmação</h2>
    <button onclick="alert('RSVP em breve')">Confirmar</button>
  </section>
</div>

<script>
// Countdown
const weddingDate = new Date("October 14, 2028 00:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const dist = weddingDate - now;

  document.getElementById("days").textContent = Math.floor(dist / (1000 * 60 * 60 * 24));
  document.getElementById("hours").textContent = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  document.getElementById("minutes").textContent = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
  document.getElementById("seconds").textContent = Math.floor((dist % (1000 * 60)) / 1000);
}

setInterval(updateCountdown, 1000);
updateCountdown();

// Música
const music = document.getElementById('music');
const musicBtn = document.getElementById('musicBtn');

// Envelope / abertura
const envelope = document.getElementById('envelope');
const scene = document.getElementById('scene');
const main = document.getElementById('main');
const sealButton = document.getElementById('sealButton');

sealButton.addEventListener('click', (e) => {
  e.stopPropagation();

  music.volume = 0;
  music.play();

  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 0.4) {
      vol += 0.02;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);

  musicBtn.style.display = 'block';

  envelope.classList.add('open');

  setTimeout(() => {
    scene.style.display = 'none';
    main.classList.add('show');

    gsap.from('.hero h1', { opacity: 0, y: 50, duration: 1 });
    gsap.from('.gallery img', {
      scrollTrigger: '.gallery',
      opacity: 0,
      y: 50,
      stagger: 0.2
    });
  }, 900);
});

function toggleMusic() {
  if (music.paused) music.play();
  else music.pause();
}
</script>

</body>
</html>
