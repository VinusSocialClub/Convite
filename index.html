<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniela & Alexandre</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #dfe5de;
  overflow: hidden;
}

h1, h2 {
  font-family: 'Playfair Display', serif;
}

/* SCENE */
.scene {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #dfe5de;
  overflow: hidden;
}

/* ENVELOPE / CAPA ABRE AO MEIO */
.envelope {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

.cover-left,
.cover-right {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 50.1%;
  background-image: url('./envelope-capa.jpg');
  background-repeat: no-repeat;
  background-size: 200% 100%;
  transition: transform 1.25s cubic-bezier(0.22, 1, 0.36, 1);
  will-change: transform;
}

.cover-left {
  left: 0;
  background-position: left center;
  box-shadow: 6px 0 20px rgba(0,0,0,0.08);
}

.cover-right {
  right: 0;
  background-position: right center;
  box-shadow: -6px 0 20px rgba(0,0,0,0.08);
}

/* esconde a meia-parte do selo que ficaria no lado esquerdo */
.cover-left::after {
  content: "";
  position: absolute;
  right: -8px;
  top: 50%;
  width: 110px;
  height: 110px;
  transform: translateY(-50%);
  border-radius: 50%;
  background:
    radial-gradient(circle at center, rgba(245,246,241,0.98) 0%, rgba(245,246,241,0.96) 70%, rgba(245,246,241,0) 100%);
  pointer-events: none;
}

/* pequena linha de separação central */
.cover-left::before,
.cover-right::before {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  width: 1px;
  background: rgba(170,180,170,0.25);
}

.cover-left::before {
  right: 0;
}

.cover-right::before {
  left: 0;
}

/* selo visível a acompanhar a página da direita */
.seal-visual {
  position: absolute;
  left: 0;
  top: 50%;
  width: 96px;
  height: 96px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  z-index: 4;
  background:
    radial-gradient(circle at 35% 30%, #9c6a64 0%, #7b4b47 52%, #5c302e 100%);
  box-shadow:
    0 8px 18px rgba(0,0,0,0.22),
    inset 0 2px 5px rgba(255,255,255,0.18),
    inset 0 -4px 8px rgba(0,0,0,0.2);
  border: 4px solid rgba(104,54,49,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
}

.seal-visual::before {
  content: "D&A";
  color: #e8ddd3;
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 1px;
}

.seal-visual::after {
  content: "";
  position: absolute;
  inset: 10px;
  border-radius: 50%;
  border: 1px solid rgba(232,221,211,0.35);
}

/* área clicável no selo */
.seal-hitbox {
  position: absolute;
  left: 0;
  top: 50%;
  width: 140px;
  height: 140px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  z-index: 5;
  background: transparent;
  cursor: pointer;
}

/* estado aberto */
.envelope.open .cover-left {
  transform: translateX(-100%);
}

.envelope.open .cover-right {
  transform: translateX(100%);
}

/* MAIN */
.main {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(rgba(248,248,244,0.88), rgba(248,248,244,0.88)),
    url('./hero.jpeg') center center / cover no-repeat;
  overflow-y: auto;
  opacity: 0;
  visibility: hidden;
  transition: all 1s ease;
}

.main.show {
  opacity: 1;
  visibility: visible;
}

section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 40px;
  text-align: center;
}

.hero {
  background: url('./hero.jpeg') center center / cover no-repeat;
  color: #445248;
}

.gallery img {
  width: 250px;
  margin: 10px;
  border-radius: 10px;
}

.countdown {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: rgba(46, 93, 70, 0.92);
  color: white;
  text-align: center;
  margin-top: 20px;
  border-radius: 12px;
  backdrop-filter: blur(2px);
}

.countdown .logo h1 {
  font-size: 60px;
  margin-bottom: 15px;
}

.countdown h2 {
  font-size: 20px;
  margin-bottom: 30px;
}

#timer {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

#timer div {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 10px;
  min-width: 80px;
}

#timer div span {
  font-size: 32px;
  font-weight: 700;
}

#timer div p {
  margin-top: 5px;
  font-size: 14px;
}

.rsvp {
  background: rgba(31, 58, 46, 0.94);
  color: white;
}

button {
  margin-top: 20px;
  padding: 12px 24px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #1f3a2e;
  cursor: pointer;
}

.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #1f3a2e;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 20px;
  cursor: pointer;
  z-index: 100;
  display: none;
}

@media (max-width: 768px) {
  .seal-visual {
    width: 84px;
    height: 84px;
  }

  .seal-visual::before {
    font-size: 18px;
  }

  .seal-hitbox {
    width: 120px;
    height: 120px;
  }

  .cover-left::after {
    width: 94px;
    height: 94px;
  }
}
</style>
</head>
<body>

<audio id="music" loop preload="auto">
  <source src="daylight.mp3" type="audio/mp3">
</audio>

<button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>

<div class="scene" id="scene">
  <div class="envelope" id="envelope">
    <div class="cover-left"></div>

    <div class="cover-right">
      <div class="seal-visual"></div>
      <div class="seal-hitbox" id="sealButton"></div>
    </div>
  </div>
</div>

<div class="main" id="main">
  <section class="hero">
  </section>

  <section class="gallery">
    <h2>Momentos</h2>
    <div>
      <img src="https://images.unsplash.com/photo-1519741497674-611481863552" alt="Foto 1" />

      <section class="countdown">
        <div class="logo"><h1>D&amp;A</h1></div>
        <h2>Contagem para o dia mais especial da nossa vida</h2>
        <div id="timer">
          <div><span id="days">0</span><p>Days</p></div>
          <div><span id="hours">0</span><p>Hours</p></div>
          <div><span id="minutes">0</span><p>Minutes</p></div>
          <div><span id="seconds">0</span><p>Seconds</p></div>
        </div>
      </section>

      <img src="https://images.unsplash.com/photo-1520857014576-2c4f4c972b57" alt="Foto 2" />
    </div>
  </section>

  <section class="rsvp">
    <h2>Confirmação</h2>
    <button onclick="alert('RSVP em breve')">Confirmar</button>
  </section>
</div>

<script>
// Countdown
const weddingDate = new Date("October 14, 2028 00:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const dist = weddingDate - now;

  document.getElementById("days").textContent = Math.floor(dist / (1000 * 60 * 60 * 24));
  document.getElementById("hours").textContent = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  document.getElementById("minutes").textContent = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
  document.getElementById("seconds").textContent = Math.floor((dist % (1000 * 60)) / 1000);
}

setInterval(updateCountdown, 1000);
updateCountdown();

// Música
const music = document.getElementById('music');
const musicBtn = document.getElementById('musicBtn');

// Envelope
const envelope = document.getElementById('envelope');
const scene = document.getElementById('scene');
const main = document.getElementById('main');
const sealButton = document.getElementById('sealButton');

sealButton.addEventListener('click', (e) => {
  e.stopPropagation();

  music.volume = 0;
  music.play();

  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 0.4) {
      vol += 0.02;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);

  musicBtn.style.display = 'block';

  envelope.classList.add('open');

  setTimeout(() => {
    scene.style.display = 'none';
    main.classList.add('show');

    gsap.from('.gallery img', {
      scrollTrigger: '.gallery',
      opacity: 0,
      y: 50,
      stagger: 0.2
    });
  }, 1350);
});

function toggleMusic() {
  if (music.paused) music.play();
  else music.pause();
}
</script>

</body>
</html>
