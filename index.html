<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniela & Alexandre</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sage-main: #8a8d6c;
  --sage-dark: #76795d;
  --sage-deep: #676b50;
  --cream: #f3eee3;
  --cream-soft: rgba(243, 238, 227, 0.82);
  --text-dark: #445248;
}

body {
  font-family: 'Inter', sans-serif;
  background: #dfe5de;
  overflow: hidden;
}

h1, h2 {
  font-family: 'Playfair Display', serif;
}

/* SCENE */
.scene {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #dfe5de;
}

/* ENVELOPE */
.envelope {
  width: 100vw;
  height: 100vh;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  background: url('./envelope-capa.jpg') center center / cover no-repeat;
  transition:
    opacity 1s ease,
    transform 1.2s cubic-bezier(0.22, 1, 0.36, 1),
    filter 1s ease;
  transform-origin: center center;
}

.envelope.open {
  opacity: 0;
  transform: scale(1.04) translateX(18px);
  filter: blur(2px);
}

.seal-hitbox {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 150px;
  height: 150px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: transparent;
}

/* MAIN */
.main {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(rgba(248,248,244,0.88), rgba(248,248,244,0.88)),
    url('./hero.jpeg') center center / cover no-repeat;
  overflow-y: auto;
  opacity: 0;
  visibility: hidden;
  transition: all 1s ease;
}

.main.show {
  opacity: 1;
  visibility: visible;
}

section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 40px;
  text-align: center;
}

.hero {
  background: url('./hero.jpeg') center center / cover no-repeat;
  color: var(--text-dark);
}

.gallery img {
  width: 250px;
  margin: 10px;
  border-radius: 10px;
}

/* COUNTDOWN NOVO */
.countdown {
  width: min(1100px, 92%);
  min-height: auto;
  padding: 72px 32px;
  margin: 28px auto 0;
  background: var(--sage-main);
  color: white;
  text-align: center;
  border-radius: 0;
  backdrop-filter: none;
  box-shadow: 0 18px 40px rgba(0,0,0,0.08);
}

.countdown-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 72px;
  line-height: 0.9;
  color: #d9cfbc;
  margin-bottom: 10px;
  position: relative;
  letter-spacing: -2px;
}

.countdown-logo .amp {
  font-size: 46px;
  position: relative;
  top: -6px;
  margin: 0 -4px;
}

.countdown-title {
  font-family: 'Great Vibes', cursive;
  font-size: 52px;
  color: #ffffff;
  font-weight: 400;
  margin-bottom: 8px;
}

.countdown-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: #e9dfc8;
  margin-bottom: 56px;
}

#timer {
  display: grid;
  grid-template-columns: repeat(4, minmax(120px, 1fr));
  gap: 24px;
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
}

#timer div {
  background: transparent;
  padding: 0;
  border-radius: 0;
  min-width: 0;
}

#timer div span {
  display: block;
  font-family: 'Playfair Display', serif;
  font-size: clamp(54px, 7vw, 76px);
  line-height: 1;
  font-weight: 400;
  color: #ffffff;
  margin-bottom: 10px;
}

#timer div p {
  margin-top: 0;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  letter-spacing: 2.6px;
  text-transform: uppercase;
  color: #efe5cf;
}

/* RSVP */
.rsvp {
  background: rgba(118, 121, 93, 0.94);
  color: white;
}

button {
  margin-top: 20px;
  padding: 12px 24px;
  border: none;
  border-radius: 30px;
  background: white;
  color: var(--sage-deep);
  cursor: pointer;
}

.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--sage-deep);
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 20px;
  cursor: pointer;
  z-index: 100;
  display: none;
}

@media (max-width: 900px) {
  .countdown {
    padding: 56px 24px;
  }

  .countdown-logo {
    font-size: 58px;
  }

  .countdown-title {
    font-size: 42px;
  }

  #timer {
    grid-template-columns: repeat(2, minmax(120px, 1fr));
    gap: 30px 18px;
    max-width: 420px;
  }
}

@media (max-width: 768px) {
  .seal-hitbox {
    width: 120px;
    height: 120px;
  }
}

@media (max-width: 520px) {
  .countdown {
    width: 94%;
    padding: 44px 18px;
  }

  .countdown-logo {
    font-size: 48px;
  }

  .countdown-title {
    font-size: 36px;
  }

  .countdown-subtitle {
    font-size: 13px;
    margin-bottom: 38px;
  }

  #timer {
    grid-template-columns: repeat(2, 1fr);
    gap: 26px 12px;
  }

  #timer div span {
    font-size: 52px;
  }

  #timer div p {
    font-size: 15px;
    letter-spacing: 1.8px;
  }
}
</style>
</head>
<body>

<audio id="music" loop preload="auto">
  <source src="daylight.mp3" type="audio/mp3">
</audio>

<button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>

<div class="scene" id="scene">
  <div class="envelope" id="envelope">
    <div class="seal-hitbox"></div>
  </div>
</div>

<div class="main" id="main">
  <section class="hero">
  </section>

  <section class="gallery">
    <h2>Momentos</h2>
    <div>
      <img src="https://images.unsplash.com/photo-1519741497674-611481863552" alt="Foto 1" />

      <section class="countdown">
        <div class="countdown-logo">
          D<span class="amp">&amp;</span>A
        </div>
        <div class="countdown-title">Countdown</div>
        <div class="countdown-subtitle">To the most special day of our lives</div>

        <div id="timer">
          <div><span id="days">0</span><p>Days</p></div>
          <div><span id="hours">0</span><p>Hours</p></div>
          <div><span id="minutes">0</span><p>Minutes</p></div>
          <div><span id="seconds">0</span><p>Seconds</p></div>
        </div>
      </section>

      <img src="https://images.unsplash.com/photo-1520857014576-2c4f4c972b57" alt="Foto 2" />
    </div>
  </section>

  <section class="rsvp">
    <h2>Confirmação</h2>
    <button onclick="alert('RSVP em breve')">Confirmar</button>
  </section>
</div>

<script>
// Countdown
const weddingDate = new Date("October 14, 2028 00:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const dist = weddingDate - now;

  document.getElementById("days").textContent = Math.floor(dist / (1000 * 60 * 60 * 24));
  document.getElementById("hours").textContent = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  document.getElementById("minutes").textContent = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
  document.getElementById("seconds").textContent = Math.floor((dist % (1000 * 60)) / 1000);
}

setInterval(updateCountdown, 1000);
updateCountdown();

// Música
const music = document.getElementById('music');
const musicBtn = document.getElementById('musicBtn');

// Envelope
const envelope = document.getElementById('envelope');
const scene = document.getElementById('scene');
const main = document.getElementById('main');

envelope.addEventListener('click', () => {
  music.volume = 0;
  music.play();

  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 0.4) {
      vol += 0.02;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);

  musicBtn.style.display = 'block';

  envelope.classList.add('open');

  setTimeout(() => {
    scene.style.display = 'none';
    main.classList.add('show');

    gsap.from('.gallery img', {
      scrollTrigger: '.gallery',
      opacity: 0,
      y: 50,
      stagger: 0.2
    });
  }, 1100);
});

function toggleMusic() {
  if (music.paused) music.play();
  else music.pause();
}
</script>

</body>
</html>
