<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniela & Alexandre</title>
<style>
body {margin:0; font-family:sans-serif; background:#0e1a14; display:flex; justify-content:center; align-items:center; height:100vh;}
#envelope {width:300px; height:200px; background:green; cursor:pointer; display:flex; justify-content:center; align-items:center; color:white; font-size:20px; border-radius:10px;}
#main {display:none; padding:40px; background:#fff; width:100%; height:100vh; overflow:auto;}
.music-btn {position:fixed; bottom:20px; right:20px; display:none;}
</style>
</head>
<body>

<audio id="music" loop preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_1f4441b0e7.mp3" type="audio/mp3">
</audio>
<button id="musicBtn" class="music-btn" onclick="toggleMusic()">🎵</button>

<div id="envelope">Clique para abrir</div>

<div id="main">
  <h1>Daniela & Alexandre</h1>
  <p>14 Outubro 2028</p>
</div>

<script>
const envelope = document.getElementById('envelope');
const main = document.getElementById('main');
const music = document.getElementById('music');
const musicBtn = document.getElementById('musicBtn');

envelope.addEventListener('click', () => {
    // TOCA A MÚSICA IMEDIATAMENTE
    music.volume = 0.4;
    music.play().then(() => {
        console.log("Música a tocar!");
        musicBtn.style.display = 'block';

        // Depois abrimos o conteúdo
        envelope.style.display = 'none';
        main.style.display = 'block';
    }).catch(err => {
        console.log("Erro a tocar música:", err);
        alert("Precisa de clicar novamente para ouvir música.");
    });
});

function toggleMusic(){
    if(music.paused) music.play();
    else music.pause();
}
</script>

</body>
</html>
