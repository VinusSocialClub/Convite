<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniela & Alexandre</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background:#0e1a14;
      color:#f5f5f5;
      overflow:hidden;
    }

    h1, h2, h3 { font-family: 'Playfair Display', serif; }

    /* Envelope Scene */
    .scene {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
    }

    .envelope {
      width:340px;
      height:230px;
      position:relative;
      cursor:pointer;
      perspective:1200px;
    }

    .base {
      position:absolute;
      width:100%;
      height:100%;
      background:#1f3a2e;
      border:1px solid rgba(255,255,255,0.1);
      border-radius:6px;
    }

    .flap {
      position:absolute;
      width:100%;
      height:100%;
      background:#2e5d46;
      clip-path: polygon(0 0, 50% 55%, 100% 0);
      transform-origin: top;
      transition: transform 1s ease;
      z-index:3;
    }

    .letter {
      position:absolute;
      width:92%;
      height:92%;
      top:4%;
      left:4%;
      background:#ffffff;
      color:#1a1a1a;
      transform: translateY(110%);
      padding:30px;
      text-align:center;
    }

    .open .flap { transform: rotateX(180deg); }
    .open .letter { transform: translateY(0); }

    .names {
      font-size:28px;
      margin-bottom:10px;
    }

    .date {
      margin-top:15px;
      font-size:14px;
      letter-spacing:2px;
    }

    /* Main Site */
    .main {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:#f7f7f7;
      color:#1a1a1a;
      overflow-y:auto;
      opacity:0;
      pointer-events:none;
    }

    .main.show {
      opacity:1;
      pointer-events:auto;
      transition:opacity 1.5s ease;
    }

    section {
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      padding:40px;
      text-align:center;
    }

    .hero {
      background:linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486?q=80&w=1974');
      background-size:cover;
      background-position:center;
      color:white;
    }

    .hero h1 {
      font-size:42px;
      margin-bottom:10px;
    }

    .details {
      background:#ffffff;
    }

    .details h2 { margin-bottom:20px; }

    .rsvp {
      background:#1f3a2e;
      color:white;
    }

    button {
      margin-top:20px;
      padding:12px 24px;
      border:none;
      background:white;
      color:#1f3a2e;
      cursor:pointer;
      border-radius:30px;
      font-weight:500;
    }

  </style>
</head>
<body>

<!-- ENVELOPE -->
<div class="scene">
  <div class="envelope" id="envelope">
    <div class="base"></div>
    <div class="flap"></div>

    <div class="letter">
      <div class="names">Daniela & Alexandre</div>
      <div>Estão a casar</div>
      <div class="date">14 · 10 · 2028</div>
    </div>
  </div>
</div>

<!-- MAIN SITE -->
<div class="main" id="main">

  <section class="hero">
    <h1>Daniela & Alexandre</h1>
    <p>14 Outubro 2028 · Lisboa</p>
  </section>

  <section class="details">
    <h2>Detalhes</h2>
    <p>Cerimónia às 15:00</p>
    <p>Receção às 18:00</p>
    <p>Local: Lisboa</p>
  </section>

  <section class="rsvp">
    <h2>Confirmação</h2>
    <p>Confirma a tua presença</p>
    <button onclick="alert('RSVP em breve!')">Confirmar</button>
  </section>

</div>

<script>
  const envelope = document.getElementById('envelope');
  const main = document.getElementById('main');

  envelope.addEventListener('click', () => {
    envelope.classList.add('open');

    gsap.to('.letter', {
      y: -200,
      duration: 1.2,
      ease: 'power3.out'
    });

    setTimeout(() => {
      document.querySelector('.scene').style.display = 'none';
      main.classList.add('show');

      gsap.from('.hero h1', { opacity:0, y:40, duration:1 });
      gsap.from('.hero p', { opacity:0, y:20, delay:0.3 });
    }, 1600);
  });
</script>

</body>
</html>
