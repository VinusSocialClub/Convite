<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniela & Alexandre</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #dfe5de;
  overflow: hidden;
}

h1, h2 {
  font-family: 'Playfair Display', serif;
}

.scene {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.55) 0%, rgba(223,229,222,1) 65%);
}

/* ENVELOPE NOVO */
.envelope {
  width: 360px;
  height: 520px;
  position: relative;
  cursor: pointer;
  border-radius: 10px;
  overflow: hidden;
  background: #f6f7f2;
  box-shadow: 0 18px 45px rgba(0,0,0,0.12);
  transition: transform 0.4s ease, opacity 0.8s ease;
}

.envelope:hover {
  transform: translateY(-3px);
}

.envelope.open {
  opacity: 0;
  transform: scale(0.98);
}

.envelope-paper {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 15%, rgba(194,210,194,0.18), transparent 18%),
    radial-gradient(circle at 75% 30%, rgba(194,210,194,0.12), transparent 20%),
    radial-gradient(circle at 35% 75%, rgba(194,210,194,0.14), transparent 22%),
    linear-gradient(180deg, #fbfbf8 0%, #f3f4ef 100%);
}

.envelope-paper::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 10% 20%, rgba(170,190,170,0.13) 0 1px, transparent 2px),
    radial-gradient(circle at 80% 18%, rgba(170,190,170,0.10) 0 1px, transparent 2px),
    radial-gradient(circle at 15% 88%, rgba(170,190,170,0.10) 0 1px, transparent 2px),
    radial-gradient(circle at 82% 80%, rgba(170,190,170,0.12) 0 1px, transparent 2px);
  opacity: 0.7;
  pointer-events: none;
}

.leaf-svg {
  position: absolute;
  inset: 0;
  z-index: 1;
  opacity: 0.62;
  pointer-events: none;
}

.center-split {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 50%;
  width: 1px;
  background: rgba(160,170,160,0.22);
  z-index: 2;
}

.seal-wrap {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 170px;
  height: 170px;
  transform: translate(-50%, -50%);
  z-index: 3;
  display: flex;
  align-items: center;
  justify-content: center;
}

.curve-text {
  position: absolute;
  inset: 0;
  width: 170px;
  height: 170px;
  overflow: visible;
}

.curve-text text {
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  letter-spacing: 2px;
  fill: #2f4639;
}

.seal {
  width: 92px;
  height: 92px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 35% 30%, #9c6a64 0%, #7b4b47 50%, #5c302e 100%);
  box-shadow:
    0 6px 14px rgba(0,0,0,0.18),
    inset 0 2px 5px rgba(255,255,255,0.18),
    inset 0 -4px 8px rgba(0,0,0,0.2);
  border: 4px solid rgba(104,54,49,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.seal::before {
  content: "D&A";
  color: #e8ddd3;
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 1px;
}

.seal::after {
  content: "";
  position: absolute;
  inset: 10px;
  border-radius: 50%;
  border: 1px solid rgba(232,221,211,0.35);
}

.envelope-hint {
  position: absolute;
  bottom: 26px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  letter-spacing: 2.5px;
  color: rgba(47,70,57,0.7);
  z-index: 2;
}

/* MAIN */
.main {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #f7f7f7;
  overflow-y: auto;
  opacity: 0;
  visibility: hidden;
  transition: all 1s ease;
}

.main.show {
  opacity: 1;
  visibility: visible;
}

section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 40px;
  text-align: center;
}

.hero {
  background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486?q=80&w=1974');
  background-size: cover;
  background-position: center;
  color: white;
}

.gallery img {
  width: 250px;
  margin: 10px;
  border-radius: 10px;
}

.countdown {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: #2e5d46;
  color: white;
  text-align: center;
  margin-top: 20px;
}

.countdown .logo h1 {
  font-size: 60px;
  margin-bottom: 15px;
}

.countdown h2 {
  font-size: 20px;
  margin-bottom: 30px;
}

#timer {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

#timer div {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 10px;
  min-width: 80px;
}

#timer div span {
  font-size: 32px;
  font-weight: 700;
}

#timer div p {
  margin-top: 5px;
  font-size: 14px;
}

.rsvp {
  background: #1f3a2e;
  color: white;
}

button {
  margin-top: 20px;
  padding: 12px 24px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #1f3a2e;
  cursor: pointer;
}

.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #1f3a2e;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 20px;
  cursor: pointer;
  z-index: 100;
  display: none;
}

@media (max-width: 600px) {
  .envelope {
    width: 300px;
    height: 435px;
  }

  .seal-wrap {
    width: 150px;
    height: 150px;
  }

  .curve-text {
    width: 150px;
    height: 150px;
  }

  .seal {
    width: 82px;
    height: 82px;
  }
}
</style>
</head>
<body>

<audio id="music" loop preload="auto">
  <source src="daylight.mp3" type="audio/mp3">
</audio>

<button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>

<div class="scene" id="scene">
  <div class="envelope" id="envelope">
    <div class="envelope-paper"></div>

    <svg class="leaf-svg" viewBox="0 0 360 520" preserveAspectRatio="none" aria-hidden="true">
      <g fill="none" stroke="#aeb7af" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M-10 110 C 65 120, 88 140, 140 170 C 185 195, 215 180, 270 145" />
        <path d="M10 350 C 65 365, 105 395, 150 430 C 190 460, 225 455, 275 425" />
      </g>

      <g fill="#c8d0c9" opacity="0.85">
        <ellipse cx="38" cy="128" rx="18" ry="32" transform="rotate(-40 38 128)"/>
        <ellipse cx="74" cy="114" rx="17" ry="30" transform="rotate(-15 74 114)"/>
        <ellipse cx="114" cy="138" rx="22" ry="37" transform="rotate(18 114 138)"/>
        <ellipse cx="166" cy="164" rx="20" ry="34" transform="rotate(42 166 164)"/>
        <ellipse cx="212" cy="170" rx="17" ry="31" transform="rotate(70 212 170)"/>
        <ellipse cx="255" cy="149" rx="22" ry="38" transform="rotate(82 255 149)"/>

        <ellipse cx="56" cy="378" rx="18" ry="31" transform="rotate(-30 56 378)"/>
        <ellipse cx="101" cy="402" rx="16" ry="28" transform="rotate(10 101 402)"/>
        <ellipse cx="148" cy="428" rx="20" ry="34" transform="rotate(32 148 428)"/>
        <ellipse cx="203" cy="446" rx="18" ry="31" transform="rotate(55 203 446)"/>
        <ellipse cx="252" cy="432" rx="22" ry="36" transform="rotate(80 252 432)"/>
      </g>
    </svg>

    <div class="center-split"></div>

    <div class="seal-wrap">
      <svg class="curve-text" viewBox="0 0 170 170" aria-hidden="true">
        <defs>
          <path id="textCurve" d="M 24 96 A 61 61 0 1 1 146 96" />
        </defs>
        <text>
          <textPath href="#textCurve" startOffset="50%" text-anchor="middle">
            CLIQUE PARA ABRIR
          </textPath>
        </text>
      </svg>

      <div class="seal"></div>
    </div>

    <div class="envelope-hint"></div>
  </div>
</div>

<div class="main" id="main">
  <section class="hero">
    <h1>Daniela & Alexandre</h1>
    <p>14 Outubro 2028 · Lisboa</p>
  </section>

  <section class="gallery">
    <h2>Momentos</h2>
    <div>
      <img src="https://images.unsplash.com/photo-1519741497674-611481863552" alt="Foto 1" />

      <section class="countdown">
        <div class="logo"><h1>D&amp;A</h1></div>
        <h2>Countdown to the most special day of our lives</h2>
        <div id="timer">
          <div><span id="days">0</span><p>Days</p></div>
          <div><span id="hours">0</span><p>Hours</p></div>
          <div><span id="minutes">0</span><p>Minutes</p></div>
          <div><span id="seconds">0</span><p>Seconds</p></div>
        </div>
      </section>

      <img src="https://images.unsplash.com/photo-1520857014576-2c4f4c972b57" alt="Foto 2" />
    </div>
  </section>

  <section class="rsvp">
    <h2>Confirmação</h2>
    <button onclick="alert('RSVP em breve')">Confirmar</button>
  </section>
</div>

<script>
// Countdown
const weddingDate = new Date("October 14, 2028 00:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const dist = weddingDate - now;

  document.getElementById("days").textContent = Math.floor(dist / (1000 * 60 * 60 * 24));
  document.getElementById("hours").textContent = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  document.getElementById("minutes").textContent = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
  document.getElementById("seconds").textContent = Math.floor((dist % (1000 * 60)) / 1000);
}

setInterval(updateCountdown, 1000);
updateCountdown();

// Música
const music = document.getElementById('music');
const musicBtn = document.getElementById('musicBtn');

// Envelope
const envelope = document.getElementById('envelope');
const scene = document.getElementById('scene');
const main = document.getElementById('main');

envelope.addEventListener('click', () => {
  music.volume = 0;
  music.play();

  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 0.4) {
      vol += 0.02;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);

  musicBtn.style.display = 'block';

  envelope.classList.add('open');

  setTimeout(() => {
    scene.style.display = 'none';
    main.classList.add('show');

    gsap.from('.hero h1', { opacity: 0, y: 50, duration: 1 });
    gsap.from('.gallery img', {
      scrollTrigger: '.gallery',
      opacity: 0,
      y: 50,
      stagger: 0.2
    });
  }, 1500);
});

function toggleMusic() {
  if (music.paused) music.play();
  else music.pause();
}
</script>

</body>
</html>
