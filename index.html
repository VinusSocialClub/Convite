<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniela & Alexandre</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background:#0e1a14;
      overflow:hidden;
    }

    h1,h2 { font-family:'Playfair Display', serif; }

    /* SCENE */
    .scene {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      z-index:10;
    }

    .envelope {
      width:340px;
      height:220px;
      position:relative;
      cursor:pointer;
      overflow:hidden; /* FIX: hides letter before opening */
      border-radius:6px;
    }

    .base {
      position:absolute;
      width:100%;
      height:100%;
      background:#1f3a2e;
      border-radius:6px;
    }

    .flap {
      position:absolute;
      width:100%;
      height:100%;
      background:#2e5d46;
      clip-path: polygon(0 0, 50% 60%, 100% 0);
      transform-origin: top;
      transition: transform 1s ease;
      z-index:3; /* always above */
    }

    .letter {
      position:absolute;
      width:92%;
      height:92%;
      top:4%;
      left:4%;
      background:white;
      color:#111;
      padding:25px;
      text-align:center;

      /* FIX: fully hidden below */
      transform: translateY(120%);
      transition: transform 1s ease;
      z-index:1; /* behind flap */
    }

    /* INITIAL STATE (hidden properly) */
    .letter-content {
      opacity:0;
      transform: translateY(10px);
      transition: all 0.8s ease;
    }

    /* OPEN STATE */
    .envelope.open .flap {
      transform: rotateX(180deg);
    }

    .envelope.open .letter {
      transform: translateY(0);
    }

    .envelope.open .letter-content {
      opacity:1;
      transform: translateY(0);
      transition-delay:0.6s;
    }

    .names {
      font-size:26px;
      margin-bottom:10px;
    }

    .date {
      margin-top:10px;
      font-size:13px;
      letter-spacing:2px;
    }

    /* MAIN SITE */
    .main {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:#f7f7f7;
      color:#111;
      overflow-y:auto;

      opacity:0;
      visibility:hidden;
    }

    .main.show {
      opacity:1;
      visibility:visible;
      transition:opacity 1.2s ease;
    }

    section {
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
      padding:40px;
    }

    .hero {
      background:linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486?q=80&w=1974');
      background-size:cover;
      background-position:center;
      color:white;
    }

    .hero h1 {
      font-size:42px;
      margin-bottom:10px;
    }

    .details {
      background:white;
    }

    .rsvp {
      background:#1f3a2e;
      color:white;
    }

    button {
      margin-top:20px;
      padding:12px 24px;
      border:none;
      border-radius:30px;
      background:white;
      color:#1f3a2e;
      cursor:pointer;
    }

  </style>
</head>
<body>

<!-- ENVELOPE -->
<div class="scene" id="scene">
  <div class="envelope" id="envelope">
    <div class="base"></div>
    <div class="flap"></div>

    <div class="letter">
      <div class="letter-content">
        <div class="names">Daniela & Alexandre</div>
        <div>Estão a casar</div>
        <div class="date">14 · 10 · 2028</div>
      </div>
    </div>

  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <section class="hero">
    <h1>Daniela & Alexandre</h1>
    <p>14 Outubro 2028 · Lisboa</p>
  </section>

  <section class="details">
    <h2>Detalhes</h2>
    <p>Cerimónia às 15:00</p>
    <p>Receção às 18:00</p>
    <p>Local: Lisboa</p>
  </section>

  <section class="rsvp">
    <h2>Confirmação</h2>
    <button onclick="alert('RSVP em breve')">Confirmar</button>
  </section>

</div>

<script>
  const envelope = document.getElementById('envelope');
  const main = document.getElementById('main');
  const scene = document.getElementById('scene');

  envelope.addEventListener('click', () => {
    envelope.classList.add('open');

    setTimeout(() => {
      gsap.to('.letter', {
        y: -250,
        duration: 1.2,
        ease: 'power3.out'
      });
    }, 800);

    setTimeout(() => {
      scene.style.display = 'none';
      main.classList.add('show');
    }, 1800);
  });
</script>

</body>
</html>
